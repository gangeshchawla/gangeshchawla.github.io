<!DOCTYPE html>
<html lang="en">
<head>
<!-- Google tag (gtag.js) -->

  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Article — Gangesh Chawla</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300;1,9..144,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #09090b; --surface: #111113; --border: #1f1f24;
      --ink: #f0eff0; --muted: #71717a; --accent: #e8c547;
      --accent2: #4ade80; --warm: #fb923c;
    }
    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--ink); font-family: 'DM Sans', sans-serif; font-weight: 300; overflow-x: hidden; }
    a { color: inherit; text-decoration: none; }

    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; padding: 0 64px; height: 64px; display: flex; align-items: center; justify-content: space-between; background: rgba(9,9,11,0.88); backdrop-filter: blur(14px); border-bottom: 1px solid var(--border); }
    .nav-logo { font-family: 'Fraunces', serif; font-size: 17px; font-weight: 300; }
    .nav-right { display: flex; align-items: center; gap: 40px; }
    .nav-links { display: flex; gap: 32px; }
    .nav-links a { font-size: 13px; color: var(--muted); transition: color .2s; }
    .nav-links a:hover { color: var(--ink); }
    .nav-cta { padding: 8px 20px; background: var(--accent); color: #09090b; font-size: 13px; font-weight: 500; border-radius: 6px; }

    /* ARTICLE HEADER */
    .article-header { padding: 120px 64px 64px; border-bottom: 1px solid var(--border); max-width: 860px; }
    .back-link { display: inline-flex; align-items: center; gap: 8px; font-size: 13px; color: var(--muted); margin-bottom: 32px; transition: color .2s; }
    .back-link:hover { color: var(--ink); }
    .article-tag { display: inline-block; padding: 4px 12px; border-radius: 100px; font-size: 12px; margin-bottom: 24px; }
    .t-health { background: #fb923c15; color: var(--warm); border: 1px solid #fb923c30; }
    .t-community { background: #4ade8015; color: var(--accent2); border: 1px solid #4ade8030; }
    .t-strategy { background: #e8c54715; color: var(--accent); border: 1px solid #e8c54730; }
    .t-leadership { background: #a78bfa15; color: #a78bfa; border: 1px solid #a78bfa30; }
    .t-other { background: #ffffff10; color: var(--muted); border: 1px solid var(--border); }
    .article-title { font-family: 'Fraunces', serif; font-size: clamp(32px, 4vw, 58px); font-weight: 300; line-height: 1.1; letter-spacing: -0.01em; margin-bottom: 24px; }
    .article-excerpt-header { font-size: 18px; line-height: 1.7; color: var(--muted); margin-bottom: 32px; max-width: 640px; }
    .article-meta-bar { display: flex; gap: 24px; align-items: center; flex-wrap: wrap; }
    .meta-item { font-size: 13px; color: var(--muted); }
    .meta-sep { color: var(--border); }

    /* COVER IMAGE */
    .cover-image-wrap { width: 100%; max-height: 480px; overflow: hidden; border-bottom: 1px solid var(--border); }
    .cover-image-wrap img { width: 100%; height: 480px; object-fit: cover; display: block; }

    /* ARTICLE BODY */
    .article-body { display: grid; grid-template-columns: 1fr 280px; gap: 0; }
    .article-content { padding: 64px; border-right: 1px solid var(--border); max-width: 760px; }

    /* PROSE */
    .prose { font-size: 17px; line-height: 1.85; color: #c4c4c8; }
    .prose p { margin-bottom: 24px; }
    .prose h2 { font-family: 'Fraunces', serif; font-size: 28px; font-weight: 300; color: var(--ink); margin: 48px 0 20px; line-height: 1.2; }
    .prose h3 { font-family: 'Fraunces', serif; font-size: 22px; font-weight: 300; color: var(--ink); margin: 36px 0 16px; }
    .prose strong { color: var(--ink); font-weight: 500; }
    .prose em { font-style: italic; color: var(--accent); }
    .prose blockquote { border-left: 3px solid var(--accent); padding: 16px 24px; margin: 32px 0; background: #e8c54708; border-radius: 0 8px 8px 0; }
    .prose blockquote p { color: var(--ink); font-size: 18px; font-style: italic; margin: 0; }
    .prose ul, .prose ol { padding-left: 24px; margin-bottom: 24px; }
    .prose li { margin-bottom: 10px; }
    .prose hr { border: none; border-top: 1px solid var(--border); margin: 40px 0; }

    /* MEDIA BLOCKS */
    .media-block { margin: 40px 0; border: 1px solid var(--border); border-radius: 12px; overflow: hidden; background: var(--surface); }
    .media-block-label { padding: 12px 20px; background: var(--bg); border-bottom: 1px solid var(--border); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); display: flex; align-items: center; gap: 8px; }
    .media-block iframe { width: 100%; border: none; display: block; }
    .media-block img { width: 100%; display: block; }
    .media-block video { width: 100%; display: block; }

    /* PHOTO GALLERY */
    .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 2px; }
    .gallery-grid img { width: 100%; height: 180px; object-fit: cover; cursor: pointer; transition: opacity .2s; }
    .gallery-grid img:hover { opacity: 0.8; }

    /* SIDEBAR */
    .article-sidebar { padding: 48px 32px; position: sticky; top: 64px; height: fit-content; }
    .sidebar-section { margin-bottom: 40px; }
    .sidebar-label { font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); margin-bottom: 16px; }
    .sidebar-author { font-size: 14px; line-height: 1.6; color: var(--muted); }
    .sidebar-author strong { color: var(--ink); font-weight: 400; display: block; margin-bottom: 4px; }
    .share-links { display: flex; flex-direction: column; gap: 8px; }
    .share-link { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; font-size: 13px; color: var(--muted); transition: all .2s; cursor: pointer; }
    .share-link:hover { border-color: var(--muted); color: var(--ink); }

    footer { padding: 28px 64px; display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); border-top: 1px solid var(--border); }

    @media (max-width: 900px) {
      nav { padding: 0 24px; } .nav-links { display: none; }
      .article-header { padding: 100px 24px 40px; }
      .article-body { grid-template-columns: 1fr; }
      .article-content { padding: 40px 24px; border-right: none; }
      .article-sidebar { display: none; }
      footer { padding: 24px; flex-direction: column; gap: 8px; }
    }
  </style>
</head>
<body>

<nav>
  <a href="/" class="nav-logo">Gangesh Chawla</a>
  <div class="nav-right">
    <div class="nav-links">
      <a href="/perspectives/">Writing</a>
      <a href="/about/">About</a>
    </div>
    <a href="index.html#contact" class="nav-cta">Say hi →</a>
  </div>
</nav>

<div class="article-header">
  <a href="/perspectives/" class="back-link">← All articles</a>
  <div id="articleTagEl"></div>
  <h1 class="article-title" id="articleTitleEl"></h1>
  <p class="article-excerpt-header" id="articleExcerptEl"></p>
  <div class="article-meta-bar">
    <span class="meta-item" id="articleDateEl"></span>
    <span class="meta-sep">·</span>
    <span class="meta-item" id="articleReadEl"></span>
  </div>
</div>

<div id="coverImageWrap"></div>

<div class="article-body">
  <div class="article-content">
    <div class="prose" id="articleBodyEl"></div>
  </div>
  <div class="article-sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">Written by</div>
      <div class="sidebar-author">
        <strong>Gangesh Chawla</strong>
        Strategy & healthcare. 5+ years at Medanta, Bain & Company, and IQVIA.
      </div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">Share</div>
      <div class="share-links">
        <div class="share-link" onclick="shareLinkedIn()">💼 Share on LinkedIn</div>
        <div class="share-link" onclick="shareWhatsApp()">💬 Share on WhatsApp</div>
        <div class="share-link" onclick="copyLink()">🔗 Copy link</div>
      </div>
    </div>
  </div>
</div>

<footer>
  <span>© 2025 Gangesh Chawla</span>
  <a href="/perspectives/" style="color: var(--muted);">← More articles</a>
</footer>

<script>
  const TAG_CLASS = { Healthcare: 't-health', Strategy: 't-strategy', Community: 't-community', Leadership: 't-leadership' };

    async function loadArticles() {
    try {
      // Try relative path first (works on GitHub Pages)
      const res = await fetch('/articles.json?nocache=' + Date.now(), {cache: 'no-store'});
      if (res.ok) {
        const data = await res.json();
        console.log('articles.json loaded:', data.length, 'articles');
        return data;
      } else {
        console.warn('articles.json fetch failed, status:', res.status);
      }
    } catch(e) {
      console.warn('articles.json fetch error:', e.message);
    }
    // Fallback to localStorage (local admin preview only)
    try {
      const local = JSON.parse(localStorage.getItem('gc_articles') || '[]');
      console.log('Using localStorage fallback:', local.length, 'articles');
      return local;
    } catch { return []; }
  }

  function formatDate(d) {
    return new Date(d).toLocaleDateString('en-IN', { day: 'numeric', month: 'long', year: 'numeric' });
  }

  function renderMediaBlock(block) {
    if (block.type === 'youtube') {
      const id = block.url.match(/(?:youtu\.be\/|v=)([^&\s]+)/)?.[1];
      if (!id) return '';
      return `<div class="media-block">
        <div class="media-block-label">▶ Video</div>
        <iframe src="https://www.youtube.com/embed/${id}" height="420" allowfullscreen></iframe>
      </div>`;
    }
    if (block.type === 'slides') {
      // Convert Google Slides share URL to embed URL
      const embedUrl = block.url.replace('/pub?', '/embed?').replace('/edit', '/embed');
      return `<div class="media-block">
        <div class="media-block-label">📊 Presentation</div>
        <iframe src="${embedUrl}" height="480" allowfullscreen></iframe>
      </div>`;
    }
    if (block.type === 'pdf') {
      return `<div class="media-block">
        <div class="media-block-label">📄 Document</div>
        <iframe src="${block.url}" height="600"></iframe>
      </div>`;
    }
    if (block.type === 'gallery') {
      return `<div class="media-block">
        <div class="media-block-label">🖼 Photos</div>
        <div class="gallery-grid">${block.images.map(img => `<img src="${img}" onclick="window.open('${img}','_blank')" alt=""/>`).join('')}</div>
      </div>`;
    }
    return '';
  }

  function buildBody(article) {
    // Split text sections by [MEDIA:n] placeholders
    let html = article.body || '';
    // Render media blocks inline
    if (article.mediaBlocks && article.mediaBlocks.length) {
      article.mediaBlocks.forEach((block, i) => {
        html = html.replace(`[MEDIA:${i}]`, renderMediaBlock(block));
      });
    }
    // Basic markdown-like rendering
    html = html
      .replace(/^## (.+)$/gm, '<h2>$1</h2>')
      .replace(/^### (.+)$/gm, '<h3>$1</h3>')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g, '<em>$1</em>')
      .replace(/^> (.+)$/gm, '<blockquote><p>$1</p></blockquote>')
      .replace(/^---$/gm, '<hr>')
      .replace(/\n\n/g, '</p><p>');
    return '<p>' + html + '</p>';
  }

  // Load article
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  (async () => {
  const articles = await loadArticles();
  const article = articles.find(a => a.id === id);

  if (!article) {
    document.querySelector('.article-header').innerHTML = '<a href="/perspectives/" class="back-link">← All articles</a><h1 class="article-title">Article not found</h1>';
  } else {
    document.title = article.title + ' — Gangesh Chawla';
    const tagArr = Array.isArray(article.tags) ? article.tags : (article.tags ? [article.tags] : (article.category ? [article.category] : []));
    document.getElementById('articleTagEl').innerHTML = tagArr.map(function(t){ return '<span class="article-tag '+(TAG_CLASS[t]||'t-healthcare')+'">'+t+'</span>'; }).join(' ');
    document.getElementById('articleTitleEl').textContent = article.title;
    document.getElementById('articleExcerptEl').textContent = article.excerpt;
    document.getElementById('articleDateEl').textContent = formatDate(article.date);
    document.getElementById('articleReadEl').textContent = article.readTime + ' min read';
    document.getElementById('articleBodyEl').innerHTML = buildBody(article);
    if (article.coverImage) {
      document.getElementById('coverImageWrap').innerHTML = `<div class="cover-image-wrap"><img src="${article.coverImage}" alt="cover"/></div>`;
    }
  }

  function shareLinkedIn() {
    window.open(`https://www.linkedin.com/sharing/share-offsite/?url=${encodeURIComponent(window.location.href)}`, '_blank');
  }
  function shareWhatsApp() {
    window.open(`https://wa.me/?text=${encodeURIComponent(article?.title + ' ' + window.location.href)}`, '_blank');
  }
  function copyLink() {
    navigator.clipboard.writeText(window.location.href);
    alert('Link copied!');
  }
  })();
</script>
</body>
</html>
