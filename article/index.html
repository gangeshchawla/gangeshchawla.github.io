<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Article — Gangesh Chawla</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300;1,9..144,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-YVV9ML4HJK"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-YVV9ML4HJK');
  </script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{--bg:#f9f9f7;--surface:#ffffff;--border:#e4e4e0;--ink:#111113;--muted:#666660;--accent:#c9a800;--accent2:#16a34a;--warm:#ea580c;}
    html.dark{--bg:#09090b;--surface:#111113;--border:#1f1f24;--ink:#ffffff;--muted:#d1d1d8;--accent:#e8c547;--accent2:#4ade80;--warm:#fb923c;}
    html{scroll-behavior:smooth;}
    body{background:var(--bg);color:var(--ink);font-family:'DM Sans',sans-serif;font-weight:400;overflow-x:hidden;transition:background .25s,color .25s;}
    a{color:inherit;text-decoration:none;}

    nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:0 64px;height:64px;display:flex;align-items:center;justify-content:space-between;background:rgba(249,249,247,0.92);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);transition:background .25s;}
    html.dark nav{background:rgba(9,9,11,0.88);}
    .nav-logo{font-family:'Fraunces',serif;font-size:17px;font-weight:300;}
    .nav-right{display:flex;align-items:center;gap:24px;}
    .nav-links{display:flex;gap:28px;}
    .nav-links a{font-size:13px;color:var(--muted);transition:color .2s;}
    .nav-links a:hover{color:var(--ink);}
    .nav-cta{padding:8px 20px;background:var(--accent);color:#ffffff;font-size:13px;font-weight:500;border-radius:6px;transition:opacity .2s;}
    html.dark .nav-cta{color:#09090b;}
    .nav-cta:hover{opacity:0.88;}
    .theme-toggle{padding:6px 14px;border:1px solid var(--border);border-radius:100px;font-size:12px;color:var(--muted);cursor:pointer;background:none;font-family:'DM Sans',sans-serif;transition:all .2s;}
    .theme-toggle:hover{border-color:var(--accent);color:var(--accent);}
    .hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:4px;background:none;border:none;}
    .hamburger span{display:block;width:22px;height:2px;background:var(--ink);border-radius:2px;transition:all .3s;}
    .mobile-menu{display:none;position:fixed;top:64px;left:0;right:0;z-index:99;background:rgba(249,249,247,0.97);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);flex-direction:column;padding:16px 32px 24px;}
    html.dark .mobile-menu{background:rgba(9,9,11,0.97);}
    .mobile-menu.open{display:flex;}
    .mobile-menu a{padding:14px 0;font-size:16px;color:var(--muted);border-bottom:1px solid var(--border);text-decoration:none;}
    .mobile-menu a:last-child{border-bottom:none;color:var(--accent);}

    .article-wrap{max-width:720px;margin:0 auto;padding:104px 32px 96px;}
    .back-link{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--muted);margin-bottom:40px;transition:color .2s;}
    .back-link:hover{color:var(--ink);}
    .article-header{margin-bottom:48px;}
    .article-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px;}
    .a-tag{display:inline-block;padding:3px 10px;border-radius:100px;font-size:11px;}
    .t-health{background:#fb923c15;color:var(--warm);border:1px solid #fb923c30;}
    .t-strategy{background:#e8c54715;color:var(--accent);border:1px solid #e8c54730;}
    .t-mba{background:#a78bfa15;color:#a78bfa;border:1px solid #a78bfa30;}
    .t-books{background:#4ade8015;color:var(--accent2);border:1px solid #4ade8030;}
    .article-title{font-family:'Fraunces',serif;font-size:clamp(28px,4vw,48px);font-weight:300;line-height:1.15;margin-bottom:20px;}
    .article-meta{display:flex;align-items:center;gap:16px;font-size:13px;color:var(--muted);flex-wrap:wrap;}
    .meta-sep{opacity:0.3;}

    .article-body{font-size:17px;line-height:1.85;color:#333330;}
    html.dark .article-body{color:#e8e8ea;}
    .article-body p{margin-bottom:24px;}
    .article-body h2{font-family:'Fraunces',serif;font-size:26px;font-weight:300;line-height:1.2;margin:48px 0 16px;color:var(--ink);}
    .article-body h3{font-family:'Fraunces',serif;font-size:20px;font-weight:300;margin:36px 0 12px;color:var(--ink);}
    .article-body blockquote{border-left:2px solid var(--accent);padding:4px 0 4px 24px;margin:36px 0;font-family:'Fraunces',serif;font-size:19px;font-style:italic;font-weight:300;line-height:1.6;color:var(--ink);}
    .article-body ul,.article-body ol{padding-left:24px;margin-bottom:24px;}
    .article-body li{margin-bottom:8px;}
    .article-body a{color:var(--accent);text-decoration:underline;text-decoration-color:#e8c54740;text-underline-offset:3px;}
    .article-body a:hover{text-decoration-color:var(--accent);}
    .article-body strong{color:var(--ink);font-weight:500;}
    .article-body hr{border:none;border-top:1px solid var(--border);margin:48px 0;}

    .article-divider{border:none;border-top:1px solid var(--border);margin:56px 0 40px;}
    .author-card{display:flex;align-items:flex-start;gap:20px;padding:32px;background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-bottom:40px;}
    .author-avatar{width:52px;height:52px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-size:20px;font-weight:300;color:#09090b;flex-shrink:0;}
    .author-name{font-size:15px;font-weight:400;margin-bottom:4px;}
    .author-bio{font-size:13px;line-height:1.7;color:var(--muted);}
    .share-bar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
    .share-label{font-size:13px;color:var(--muted);margin-right:4px;}
    .share-btn{padding:8px 18px;border:1px solid var(--border);border-radius:100px;font-size:12px;color:var(--muted);cursor:pointer;background:none;font-family:'DM Sans',sans-serif;transition:all .2s;display:inline-block;}
    .share-btn:hover{border-color:var(--accent);color:var(--accent);}

    .float-share{position:fixed;right:28px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:8px;z-index:50;}
    .float-share-label{font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:4px;font-family:'DM Sans',sans-serif;}
    .float-share-btn{display:flex;align-items:center;gap:10px;padding:10px 16px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--muted);font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer;text-decoration:none;transition:all .2s;white-space:nowrap;}
    .float-share-btn:hover{border-color:var(--accent);color:var(--accent);}
    @media(max-width:1100px){.float-share{display:none;}}

    .loading-state{text-align:center;padding:120px 32px;color:var(--muted);font-size:15px;}
    .error-state{text-align:center;padding:120px 32px;}
    .error-title{font-family:'Fraunces',serif;font-size:28px;font-weight:300;margin-bottom:12px;}
    .error-sub{font-size:14px;color:var(--muted);}

    footer{padding:28px 64px;display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--muted);border-top:1px solid var(--border);}

    @media(max-width:900px){
      nav{padding:0 24px;}
      .nav-links{display:none;}
      .hamburger{display:flex;}
      .article-wrap{padding:88px 24px 64px;}
      footer{padding:24px;flex-direction:column;gap:8px;text-align:center;}
    }
  </style>
</head>
<body>

<script data-cfasync="false">
function toggleTheme(){
  var d=document.documentElement.classList.toggle('dark');
  var b=document.getElementById('themeBtn');
  if(b){b.textContent=d?'Light mode':'Dark mode';}
  try{localStorage.setItem('gc-theme',d?'dark':'light');}catch(e){}
}
(function(){
  try{
    if(localStorage.getItem('gc-theme')==='dark'){
      document.documentElement.classList.add('dark');
      document.addEventListener('DOMContentLoaded',function(){
        var b=document.getElementById('themeBtn');
        if(b)b.textContent='Light mode';
      });
    }
  }catch(e){}
})();
</script>

<nav>
  <a href="/" class="nav-logo">Gangesh Chawla</a>
  <div class="nav-right">
    <div class="nav-links">
      <a href="/perspectives/">Perspectives</a>
      <a href="/about/">About</a>
    </div>
    <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">Dark mode</button>
    <a href="/perspectives/#contact" class="nav-cta">Say Hi &#8594;</a>
    <button class="hamburger" id="gc-ham" onclick="toggleMenu()" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </div>
</nav>
<div class="mobile-menu" id="gc-mob">
  <a href="/perspectives/">Perspectives</a>
  <a href="/about/">About</a>
  <a href="/perspectives/#contact" onclick="toggleMenu()">Say Hi &#8594;</a>
</div>

<div class="float-share" id="floatShare">
  <div class="float-share-label">Share</div>
  <a class="float-share-btn" id="linkedinShare" href="#" target="_blank">&#128188; Share on LinkedIn</a>
  <a class="float-share-btn" id="whatsappShare" href="#" target="_blank">&#128172; Share on WhatsApp</a>
  <button class="float-share-btn" onclick="copyLink()">&#128279; Copy link</button>
</div>

<div class="article-wrap">
  <div id="articleContent">
    <div class="loading-state">Loading...</div>
  </div>
</div>

<footer>
  <span>&#169; 2026 Gangesh Chawla</span>
  <a href="/" style="color:var(--accent)">&#8592; Home</a>
</footer>

<script data-cfasync="false">
var TAG_CLASS = {'Healthcare':'t-health','Strategy':'t-strategy','MBA Experience':'t-mba','Book Summary':'t-books'};
var SUBSCRIBE_URL = 'https://script.google.com/macros/s/AKfycbxTe5cpbv3UbevtaCFX1eChNKowsgwbHNUWU22U6TcQQv6cP2fFSJYq9Vq2a2_1BLdr/exec';

function getParam(name){
  var s=window.location.search;
  var idx=s.indexOf(name+'=');
  if(idx===-1)return null;
  var start=idx+name.length+1;
  var end=s.indexOf('&',start);
  return decodeURIComponent(end===-1?s.slice(start):s.slice(start,end));
}

function tagHTML(tags){
  if(!tags)return'';
  var arr=Array.isArray(tags)?tags:[tags];
  return arr.map(function(t){
    var cls=TAG_CLASS[t]||'t-health';
    return'<span class="a-tag '+cls+'">'+t+'</span>';
  }).join('');
}

function formatDate(d){
  return new Date(d).toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'});
}

function renderArticle(a){
  document.title=a.title+' \u2014 Gangesh Chawla';
  var url=encodeURIComponent(window.location.href);
  var txt=encodeURIComponent(a.title);
  document.getElementById('linkedinShare').href='https://www.linkedin.com/sharing/share-offsite/?url='+url;
  document.getElementById('whatsappShare').href='https://wa.me/?text='+txt+'%20'+url;
  document.getElementById('floatShare').style.display='flex';
  var html='<a href="/perspectives/" class="back-link">&#8592; All perspectives</a>';
  html+='<div class="article-header">';
  html+='<div class="article-tags">'+tagHTML(a.tags)+'</div>';
  html+='<h1 class="article-title">'+a.title+'</h1>';
  html+='<div class="article-meta"><span>'+formatDate(a.date)+'</span><span class="meta-sep">|</span><span>'+(a.readTime||5)+' min read</span></div>';
  html+='</div>';
  html+='<div class="article-body">'+(a.content||('<p>'+a.excerpt+'</p>'))+'</div>';
  html+='<hr class="article-divider"/>';
  html+='<div class="author-card"><div class="author-avatar">G</div><div><div class="author-name">Gangesh Chawla</div><div class="author-bio">Pursuing MBA at ISB. Alum of Medanta, Bain and IQVIA. Writing about healthcare strategy, emerging markets, and what I learn along the way.</div></div></div>';

  document.getElementById('articleContent').innerHTML=html;
}

function showError(){
  document.getElementById('articleContent').innerHTML='<div class="error-state"><div class="error-title">Article not found</div><div class="error-sub"><a href="/perspectives/" style="color:var(--accent)">Back to all perspectives</a></div></div>';
}

function loadArticle(){
  var id=getParam('id');
  if(!id){showError();return;}
  fetch('/articles.json?v='+Date.now(),{cache:'no-store'})
    .then(function(r){return r.json();})
    .then(function(data){
      var found=null;
      for(var i=0;i<data.length;i++){
        if(String(data[i].id)===String(id)){found=data[i];break;}
      }
      if(found){renderArticle(found);}else{showError();}
    })
    .catch(function(){showError();});
}

function copyLink(){
  navigator.clipboard.writeText(window.location.href)
    .then(function(){alert('Link copied!');})
    .catch(function(){alert('Could not copy.');});
}

loadArticle();
</script>

<script data-cfasync="false">
function toggleMenu(){
  document.getElementById('gc-ham').classList.toggle('open');
  document.getElementById('gc-mob').classList.toggle('open');
}
</script>
</body>
</html>
